; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags = -Itest/mock
build_src_filter = -<*> +<DurationParser.cpp> +<RingPattern.cpp> +<MotorDriver.cpp> +<Ringer.cpp> +<Timer.cpp> +<mock_millis.cpp>

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/tty.usbserial-1452430
monitor_port = /dev/tty.usbserial-1452430
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager
    me-no-dev/ESPAsyncWebServer
    me-no-dev/AsyncTCP

; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32ota
; default_envs = esp32dev

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags = -Itest/mock -std=c++11
build_src_filter = -<*> +<timer/DurationParser.cpp> +<ringer/RingPattern.cpp> +<hardware/MotorDriver.cpp> +<ringer/Ringer.cpp> +<timer/Timer.cpp> +<system/Logger.cpp> +<alarm/AlarmManager.cpp> +<clock/ClockManager.cpp> +<web/Events.cpp> +<hardware/DialReader.cpp> +<hardware/ButtonTrigger.cpp> +<hardware/HandsetMonitor.cpp> +<hardware/DialManager.cpp> +<phone/PhoneController.cpp> +<test/mock_millis.cpp> +<test/mock_streams.cpp> +<test/mock_gpio.cpp> +<test/mock_ringer_events.cpp>

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<*> -<test/>
build_flags = !python scripts/hydrate_build_flags.py
extra_scripts =
    pre:scripts/inject_serial_port.py
    pre:scripts/compress_html.py
board_build.partitions = partitions.csv
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager@2.0.17
    me-no-dev/ESPAsyncWebServer@3.6.0
    me-no-dev/AsyncTCP@3.3.2
    jandrassy/TelnetStream@1.3.0
    bblanchon/ArduinoJson@7.4.2

[env:esp32ota]
extends = env:esp32dev
extra_scripts =
    pre:scripts/inject_serial_port.py
    pre:scripts/inject_ota_auth.py
    pre:scripts/compress_html.py
upload_protocol = espota
; must add IP=, PORT=, and OTA_PASSWORD= in .env
